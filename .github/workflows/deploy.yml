#  Step 1 → checkout code
#  Step 2 → install java
#  Step 3 → build application
#  Step 4 → deploy
#  @v2 -> version 2.x.x
#  @V3 -> version 3.x.x
#  @v4 -> version 4.x.x
#  The github.sha is a long string of 40 characters (called a commit hash) that GitHub automatically generates every time you push code. It looks something like this: a1b2c3d4e5f6...

#  The S3Key is simply the filename of your object inside the S3 bucket.
#    S3Bucket: The name of the folder (the bucket).
#    S3Key: The name of the file inside that folder.

#  remember this
#  When a command runs, it can produce two streams.
#  | Stream          | Number | Meaning        |
#  | --------------- | ------ | -------------- |
#  | Standard Output |  1     | normal result  |
#  | Error Output    |  2     | error messages |
# /dev/null is a special file in Linux.  Anything sent there is discarded forever.
# 2>/dev/null => Send error messages to /dev/null (trash)

#  Elastic Beanstalk Concept Hierarchy:
#  Elastic Beanstalk
#  ↓
#  Application
#  ↓
#  Environment
#  ↓
#  Application Version
#  ↓
#  Running Infrastructure (EC2, Load balancer, etc.)

# springboot-aws-beanstalk-cicd
# Application: springboot-aws-beanstalk-cicd
#  ├── dev-env
#  ├── staging-env
#  └── prod-env
#
#Every deployment is a version.
name: Spring Boot → AWS Elastic Beanstalk Deployment

on:
  push:
    branches: [ main ]

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      # Step 1 — Checkout repository code
      - name: Checkout source code
        uses: actions/checkout@v4


      # Step 2 — Install Java (Amazon Corretto 23)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '23'


      # Step 3 — Build Spring Boot application
      - name: Build application
        run: mvn clean package


      # Step 4 — Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1


      # Step 5 — Ensure S3 bucket exists
      - name: Create S3 bucket if missing
        run: |
          aws s3api head-bucket --bucket springboot-beanstalk-artifacts 2>/dev/null \
          || aws s3 mb s3://springboot-beanstalk-artifacts


      # Step 6 — Upload JAR artifact to S3
      - name: Upload artifact to S3
        run: |
          aws s3 cp target/*.jar \
          s3://springboot-beanstalk-artifacts/app-${{ github.sha }}.jar


      # Step 7 — Create Elastic Beanstalk Application (if missing)
      # Check if the app exists. If grep finds nothing, it returns an error, triggering the '||'
      - name: Create EB Application
        run: |
            aws elasticbeanstalk describe-applications --query "Applications[*].ApplicationName" --output text | grep -q "springboot-aws-beanstalk-cicd" \
            || (aws elasticbeanstalk create-application --application-name springboot-aws-beanstalk-cicd && sleep 5)

      # Step 8 — Create Application Version
      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name springboot-aws-beanstalk-cicd \
            --version-label ${{ github.sha }} \
            --source-bundle S3Bucket=springboot-beanstalk-artifacts,S3Key=app-${{ github.sha }}.jar


      # Step 9 — Create Environment if it does not exist
      - name: Create environment if missing
        run: |
            # Check if environment exists
            aws elasticbeanstalk describe-environments --application-name springboot-aws-beanstalk-cicd --query "Environments[*].EnvironmentName" --output text | grep -q "springboot-aws-beanstalk-cicd-env" \
            || aws elasticbeanstalk create-environment \
              --application-name springboot-aws-beanstalk-cicd \
              --environment-name springboot-aws-beanstalk-cicd-env \
              --solution-stack-name "64bit Amazon Linux 2023 v4.4.1 running Corretto 23"

      # Step 10 — Deploy application version
      - name: Deploy to Elastic Beanstalk environment
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name springboot-aws-beanstalk-cicd-env \
            --version-label ${{ github.sha }}#Step 1: You push code to GitHub.

#Step1 :
#Step 2: GitHub Actions sees the SHA for this push is 7fb3a12.
#Step 3: The script tells AWS: "Create a new version called 7fb3a12 using the file I just uploaded to S3."
#Step 4: The script then tells AWS: "Update my environment to use version 7fb3a12."

#This pipeline will:
#
#  Checkout code
#
#  Install Java
#
#  Build Spring Boot app
#
#  Configure AWS credentials
#
#  Create S3 bucket (if missing)
#
#  Upload artifact
#
#  Create Elastic Beanstalk application
#
#  Create application version
#
#  Create environment (if missing)
#
#  Deploy version